name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Needed for checking out tags
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      STABLE_TAG: v1.1.5-Stable-CycleTool # <--- 在這裡更新你指定的穩定版本 Tag
    steps:
      - name: Checkout Current (Main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build Current version
        env:
          VITE_BASE_PATH: /SheetMusic_Viewer/
          VITE_APP_MODE: current
        run: |
          npm install
          npm run build
          # 強制注入 env-main class 到 body
          sed -i 's/<body/<body class="env-main"/g' dist/index.html
          mkdir -p final_deploy
          cp -r dist/* final_deploy/

      - name: Checkout Stable Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.STABLE_TAG }}
          path: stable_source

      - name: Build Stable version
        env:
          VITE_BASE_PATH: /SheetMusic_Viewer/stable/
          VITE_APP_MODE: stable
        run: |
          cd stable_source
          npm install
          npm run build
          # 強制注入 env-stable class 到 body，並修正可能存在的絕對路徑
          sed -i 's/<body/<body class="env-stable"/g' dist/index.html
          # 修正舊版本中可能導致資源跳回根目錄的絕對路徑
          sed -i 's/href="\/src/href="src/g' dist/index.html
          sed -i 's/src="\/src/src="src/g' dist/index.html
          mkdir -p ../final_deploy/stable
          cp -r dist/* ../final_deploy/stable/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './final_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
