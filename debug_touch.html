<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; }
        #viewer {
            width: 100vw; height: 100vh;
            overflow-y: scroll; -webkit-overflow-scrolling: touch;
            background: #eee;
        }
        .content { height: 300vh; background: linear-gradient(to bottom, #fff, #ccc); padding: 20px; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.1); display: flex; align-items: center; justify-content: center;
            z-index: 10; pointer-events: auto; touch-action: none;
        }
        #btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 20;
            padding: 15px 30px; background: #007aff; color: white; border: none; border-radius: 10px;
        }
        .log { position: fixed; top: 10px; left: 10px; z-index: 30; background: rgba(0,0,0,0.7); color: lime; padding: 10px; pointer-events: none; font-size: 12px; }
    </style>
</head>
<body>
    <div id="viewer">
        <div class="content">
            <h1>Scroll Test</h1>
            <p>1. Try dragging here (should fail because of red overlay).</p>
            <div style="height: 100vh;"></div>
            <p>2. Click the button below.</p>
            <div style="height: 100vh;"></div>
            <p>3. Try dragging IMMEDIATELY.</p>
        </div>
    </div>
    <div id="overlay">OVERLAY ACTIVE (STAMP MODE)</div>
    <button id="btn">SWITCH TO VIEW MODE</button>
    <div id="debug-log" class="log">Ready...</div>

    <script>
        const overlay = document.getElementById('overlay');
        const btn = document.getElementById('btn');
        const logEl = document.getElementById('debug-log');
        const viewer = document.getElementById('viewer');

        function log(msg) { logEl.innerText = msg; console.log(msg); }

        btn.onclick = (e) => {
            log("Button Clicked. Switching...");
            
            // The Logic we are testing:
            overlay.style.display = 'none';
            overlay.style.pointerEvents = 'none';
            document.body.style.touchAction = 'auto';
            viewer.style.touchAction = 'auto';
            
            log("View Mode Active. Try dragging NOW.");
        };

        viewer.addEventListener('touchstart', () => log("Viewer touchstart!"), {passive: true});
        viewer.addEventListener('scroll', () => log("Viewer scrolling!"), {passive: true});
    </script>
</body>
</html>
