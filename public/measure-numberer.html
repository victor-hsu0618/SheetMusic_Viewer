<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Measure Numberer — ScoreFlow Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="./tools/auth/BarlineStaffDetector.js"></script>
    <script src="./tools/auth/fingerprint.js"></script>
    <link rel="stylesheet" href="./tools/auth/shared-styles.css">
    <script src="./tools/auth/theme-manager.js"></script>
    <style>
        :root {
            --sidebar-w: 300px;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        #app {
            display: flex;
            height: 100vh;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        #sidebar-header a {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            text-decoration: none;
            opacity: 0.7;
            margin-bottom: 12px;
        }

        #sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        #sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Section */
        .s-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .s-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .s-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Keypad */
        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 5px;
        }

        .key-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .key-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--primary); color: var(--primary); }
        .key-btn:active { transform: scale(0.95); background: rgba(99, 102, 241, 0.2); }
        .key-btn.action { font-size: 12px; background: rgba(99, 102, 241, 0.1); color: var(--primary); }

        /* Inputs */
        .num-display {
            flex: 1; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 8px; padding: 10px;
            font-size: 22px; font-weight: 800; text-align: center; color: var(--primary); min-height: 48px;
            display: flex; align-items: center; justify-content: center;
        }

        .num-display.active {
            border-color: var(--primary); background: rgba(99, 102, 241, 0.15); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .stepper {
            display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.05);
            padding: 6px 10px; border-radius: 10px; border: 1px solid var(--border);
        }

        .step-btn {
            width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05); color: var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }
        .step-btn:hover { background: var(--primary); border-color: var(--primary); }

        /* ── Main View ── */
        #main {
            flex: 1; display: flex; flex-direction: column; position: relative; background: #080f1e;
        }

        #topbar {
            height: 56px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 100;
        }

        .file-info {
            flex: 1; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .btn {
            padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer;
            border: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.3); }

        #viewer-container {
            flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column;
            align-items: center; gap: 40px; position: relative; scroll-behavior: smooth;
        }

        .page-container {
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); background: white; flex-shrink: 0;
        }

        .page-canvas { display: block; }

        .interaction-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair;
        }

        .measure-marker {
            position: absolute; background: transparent; border: none; color: #000; font-weight: 800; font-size: 11px;
            padding: 0; border-radius: 0; pointer-events: auto; transform: translate(-50%, -50%);
            white-space: nowrap; z-index: 50; cursor: move; transition: transform 0.2s;
        }

        .measure-marker.active {
            color: #f59e0b; background: rgba(245, 158, 11, 0.1); outline: 1.5px solid #f59e0b;
            outline-offset: 4px; border-radius: 4px; transform: translate(-50%, -50%) scale(1.3); z-index: 60;
        }

        .system-guide {
            position: absolute; left: 0; width: 100%; background: rgba(34, 211, 238, 0.1);
            border-top: 1px solid rgba(34, 211, 238, 0.3); border-bottom: 1px solid rgba(34, 211, 238, 0.3);
            pointer-events: none; z-index: 10;
        }

        #drop-zone {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg); z-index: 20; gap: 20px;
        }

        #loading-overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000; gap: 15px;
        }

        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <input type="file" id="sf-measure-file-input" accept=".pdf" style="display:none;" onchange="handleFile(this.files[0])">
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <header id="sidebar-header">
                <a href="./index.html">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                    返回主程式
                </a>
                <h1>🔢 Measure Numberer</h1>
            </header>

            <div id="sidebar-body">
                <!-- Navigation -->
                <div class="s-section">
                    <div class="s-title">巡檢與導航</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 40px 40px; gap:8px;">
                        <button class="btn btn-outline" onclick="navigateMarker(-1)" style="padding:8px 2px; font-size:11px;">上一個</button>
                        <button class="btn btn-outline" onclick="navigateMarker(1)" style="padding:8px 2px; font-size:11px;">下一個</button>
                        <button id="btn-add-mode" class="btn btn-outline" onclick="toggleAddMode()" title="臨時手動新增標記" style="padding:0;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <button id="btn-system-mode" class="btn btn-outline" onclick="toggleSystemMode()" title="手動編輯譜表區塊 (拖曳新增/右鍵刪除)" style="padding:0;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                                <line x1="3" y1="14" x2="21" y2="14"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="nav-info" style="font-size:11px; text-align:center; color:var(--text-muted);">無標記</div>
                </div>

                <!-- Keypad & Input (Dashboard Style) -->
                <div class="s-section">
                    <div class="s-title">校對儀表板</div>
                    
                    <!-- 1. Current Info -->
                    <div class="input-group">
                        <label style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">1. 目前標記資訊</label>
                        <div style="display:flex; gap:8px; align-items:flex-end; background:rgba(0,0,0,0.2); padding:10px; border-radius:12px; border:1px solid var(--border);">
                            <div class="input-group" style="flex: 2; align-items:center;">
                                <div class="num-display" id="section-display" onclick="setActiveField('section')" style="font-size:18px; min-height:40px; width:100%;">-</div>
                                <span style="font-size:8px; opacity:0.5; margin-top:2px;">首/樂章</span>
                            </div>
                            <div style="padding-bottom:22px; font-weight:800; opacity:0.3;">-</div>
                            <div class="input-group" style="flex: 3; align-items:center;">
                                <div class="num-display active" id="measure-display" onclick="setActiveField('measure')" style="min-height:40px; width:100%;">1</div>
                                <span style="font-size:8px; opacity:0.5; margin-top:2px;">小節數</span>
                            </div>
                        </div>
                    </div>

                    <!-- 2. Step (Main Control) -->
                    <div style="margin: 5px 0; padding: 12px; background: rgba(239, 68, 68, 0.05); border: 2px solid var(--danger); border-radius: 14px; display: flex; flex-direction: column; gap: 8px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <label style="font-size:11px; font-weight:800; color:var(--danger);">2. 修正每行小節數 (Step)</label>
                            <span style="font-size:9px; color:var(--text-muted); opacity:0.8;">主要調整項</span>
                        </div>
                        <div class="stepper" style="padding:4px; gap:15px; background:transparent; border:none; justify-content:center;">
                            <button class="step-btn" onclick="adjustStep(-1)" style="width:36px; height:36px; font-size:20px; border-color:var(--danger); color:var(--danger);">-</button>
                            <span id="step-value" style="font-size:24px; font-weight:900; color:var(--text); min-width:40px; text-align:center;">4</span>
                            <button class="step-btn" onclick="adjustStep(1)" style="width:36px; height:36px; font-size:20px; border-color:var(--danger); color:var(--danger);">+</button>
                        </div>
                        <p style="font-size:9px; color:var(--danger); text-align:center; opacity:0.8; font-weight:600;">調整此值將自動重新計算後續所有小節號</p>
                    </div>

                    <!-- 3. Next Prediction -->
                    <div class="input-group">
                        <label style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">3. 預計下個數值</label>
                        <div style="display:flex; gap:8px; align-items:flex-end; background:rgba(99, 102, 241, 0.05); padding:10px; border-radius:12px; border:1px dashed var(--primary);">
                            <div class="input-group" style="flex: 2; align-items:center;">
                                <div class="num-display" id="next-section-preview" style="font-size:18px; min-height:40px; border-style:dashed; opacity:0.7; width:100%;">-</div>
                                <span style="font-size:8px; opacity:0.4; margin-top:2px;">首/樂章</span>
                            </div>
                            <div style="padding-bottom:22px; font-weight:800; opacity:0.3;">-</div>
                            <div class="input-group" style="flex: 3; align-items:center;">
                                <div class="num-display" id="next-measure-preview" style="min-height:40px; border-style:dashed; opacity:0.7; width:100%;">5</div>
                                <span style="font-size:8px; opacity:0.4; margin-top:2px;">小節數</span>
                            </div>
                        </div>
                    </div>

                    <!-- 4. Confirm Button -->
                    <div style="display:flex; flex-direction:column; gap:8px; margin-top:5px;">
                        <button class="btn btn-primary" id="btn-confirm-next" onclick="navigateMarker(1)" style="height:56px; font-size:18px; background:var(--success); box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4); border: 2px solid rgba(255,255,255,0.2);">
                            ✅ 確認並跳轉
                        </button>
                        
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                            <button class="btn btn-outline" onclick="deleteActiveMarker()" style="color:var(--danger); border-color:rgba(239, 68, 68, 0.3); background:rgba(239, 68, 68, 0.05);">
                                🗑️ 刪除標記
                            </button>
                            <button class="btn btn-outline" onclick="recalculatePage()" style="font-size:11px; opacity:0.8;">
                                🔄 重新計算本頁
                            </button>
                        </div>
                    </div>

                    <!-- Keypad -->
                    <div class="keypad-grid" style="margin-top:5px;">
                        <div class="key-btn" onclick="appendNum(1)">1</div>
                        <div class="key-btn" onclick="appendNum(2)">2</div>
                        <div class="key-btn" onclick="appendNum(3)">3</div>
                        <div class="key-btn" onclick="appendNum(4)">4</div>
                        <div class="key-btn" onclick="appendNum(5)">5</div>
                        <div class="key-btn" onclick="appendNum(6)">6</div>
                        <div class="key-btn" onclick="appendNum(7)">7</div>
                        <div class="key-btn" onclick="appendNum(8)">8</div>
                        <div class="key-btn" onclick="appendNum(9)">9</div>
                        <div class="key-btn action" onclick="clearNum()">C</div>
                        <div class="key-btn" onclick="appendNum(0)">0</div>
                        <div class="key-btn action" onclick="backspaceNum()">⌫</div>
                    </div>
                </div>

                <!-- Alignment Control -->
                <div class="s-section" style="margin-top:5px;">
                    <div class="s-title">X 軸位置微調</div>
                    <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:12px; border:1px solid var(--border); display:flex; flex-direction:column; gap:8px;">
                        <!-- Range Selector -->
                        <div style="display:flex; background:rgba(255,255,255,0.05); border-radius:8px; padding:2px;">
                            <button id="range-single" class="btn-range active" onclick="setAlignRange('single')">單個</button>
                            <button id="range-page" class="btn-range" onclick="setAlignRange('page')">本頁</button>
                            <button id="range-all" class="btn-range" onclick="setAlignRange('all')">全譜</button>
                        </div>

                        <!-- Shifter -->
                        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
                            <button class="step-btn" onclick="shiftX(-0.01)" style="width:40px; height:40px; font-size:18px;">⇠</button>
                            <div style="text-align:center;">
                                <div id="x-display" style="font-size:16px; font-weight:800; color:var(--primary);">5%</div>
                                <div style="font-size:8px; opacity:0.5;">X 座標</div>
                            </div>
                            <button class="step-btn" onclick="shiftX(0.01)" style="width:40px; height:40px; font-size:18px;">⇢</button>
                        </div>
                    </div>
                </div>

                <style>
                    .btn-range {
                        flex: 1; background: transparent; border: none; color: var(--text-muted);
                        font-size: 10px; font-weight: 700; padding: 6px; cursor: pointer; border-radius: 6px;
                        transition: all 0.2s;
                    }
                    .btn-range.active { background: var(--primary); color: white; }
                </style>
            </div>
        </aside>

        <!-- Main -->
        <main id="main">
            <header id="topbar">
                <div class="file-info" id="file-name">未載入檔案</div>
                
                <!-- Page Navigator -->
                <div id="page-controls" style="display:none; align-items:center; gap:12px; background:rgba(255,255,255,0.05); padding:4px 12px; border-radius:100px; border:1px solid var(--border);">
                    <button class="step-btn" onclick="scrollPage(-1)" style="border:none; background:transparent;">⇠</button>
                    <span id="page-counter" style="font-size:12px; font-weight:700; min-width:60px; text-align:center;">1 / 1</span>
                    <button class="step-btn" onclick="scrollPage(1)" style="border:none; background:transparent;">⇢</button>
                </div>

                <div style="display:flex; gap:10px;">
                    <button class="btn btn-outline" onclick="document.getElementById('sf-measure-file-input').click()">📂 開啟</button>
                    <button class="btn btn-primary" id="btn-export" disabled onclick="exportPdf()">💾 導出 PDF</button>
                </div>
            </header>

            <div id="viewer-container">
                <div id="drop-zone" onclick="document.getElementById('sf-measure-file-input').click()">
                    <div class="drop-icon">📄</div>
                    <div class="drop-text">拖曳 PDF 到這裡</div>
                </div>
            </div>

            <div id="loading-overlay">
                <div class="spinner"></div>
                <div id="loading-text" style="font-weight:700; color:var(--text-muted);">分析中...</div>
            </div>
        </main>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null, pdfBytes = null, totalPages = 0;
        let pdfFingerprint = null;
        let scale = 1.3, markers = [], allPageData = [];
        let activeMarkerIndex = -1, activeField = 'measure';
        let currentSection = "", currentMeasure = 1, step = 4, isNewInput = true, dragTarget = null;
        let addMode = false, systemMode = false, dragBox = null;

        const viewerContainer = document.getElementById('viewer-container');
        const dropZone = document.getElementById('drop-zone');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); navigateMarker(1); }
            else if ((e.key === 'Delete' || e.key === 'Backspace') && activeMarkerIndex >= 0) {
                // Ensure we aren't editing a number field
                if (isNewInput) { e.preventDefault(); deleteActiveMarker(); }
            }
        });

        // ── Persistence ──
        function getStorageKey() {
            return `sf_measure_data_${pdfFingerprint}`;
        }

        function saveState() {
            if (!pdfDoc || !pdfFingerprint) return;
            // Also save systems if they were modified/manually added
            const systemsData = allPageData.map(p => p ? p.systems : []);
            const data = { markers, currentSection, currentMeasure, step, activeMarkerIndex, systemsData };
            localStorage.setItem(getStorageKey(), JSON.stringify(data));
        }

        function loadState() {
            if (!pdfFingerprint) return false;
            const saved = localStorage.getItem(getStorageKey());
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    markers = data.markers || [];
                    currentSection = data.currentSection || "";
                    currentMeasure = data.currentMeasure || 1;
                    step = data.step || 4;
                    // Note: allPageData will be rebuilt, we'll restore systemsData later in renderAllPages
                    return { markers, currentSection, currentMeasure, step, systemsData: data.systemsData };
                } catch (e) { console.error(e); }
            }
            return false;
        }

        let currentPageNum = 1;

        async function handleFile(file) {
            if (!file) return;
            try {
                loadingOverlay.style.display = 'flex';
                loadingText.textContent = '正在讀取檔案...';

                // Reset state for new file
                currentPageNum = 1;
                markers = [];
                allPageData = [];
                activeMarkerIndex = -1;
                activeField = 'measure';
                isNewInput = true;
                addMode = false;
                systemMode = false;
                dragTarget = null;
                viewerContainer.innerHTML = '';
                
                // Reset input so the same file can be picked again if needed
                const fileInput = document.getElementById('sf-measure-file-input');
                if (fileInput) fileInput.value = '';

                document.getElementById('file-name').textContent = file.name;
                
                // 1. Get ArrayBuffer
                const arrayBuffer = await file.arrayBuffer();
                pdfBytes = new Uint8Array(arrayBuffer);
                
                // 2. Compute fingerprint
                loadingText.textContent = '正在計算檔案指紋 (SHA-256)...';
                pdfFingerprint = await Fingerprint.computeFingerprint(pdfBytes);

                // 3. Create a SEPARATE copy for Rendering (pdf.js) 
                const pdfJsBytes = new Uint8Array(arrayBuffer.slice(0));
                
                if (pdfDoc) {
                    try { await pdfDoc.destroy(); } catch(e) {}
                }
                
                pdfDoc = await pdfjsLib.getDocument({ data: pdfJsBytes }).promise;
                totalPages = pdfDoc.numPages;
                dropZone.style.display = 'none';
                document.getElementById('btn-export').disabled = false;
                document.getElementById('page-controls').style.display = 'flex';
                document.getElementById('page-counter').textContent = `1 / ${totalPages}`;
                
                const savedData = loadState();
                if (savedData) {
                    loadingOverlay.style.display = 'none';
                    if (confirm(`發現進度，是否載入？`)) { 
                        updateNumDisplay(); 
                        await renderAllPages(false, savedData.systemsData); 
                    }
                    else { 
                        currentMeasure = 1; currentSection = ""; 
                        updateNumDisplay();
                        await renderAllPages(true); 
                    }
                } else { 
                    loadingOverlay.style.display = 'none';
                    currentMeasure = 1; currentSection = ""; 
                    updateNumDisplay();
                    await renderAllPages(true); 
                }
            } catch (err) {
                console.error(err);
                alert("載入失敗: " + err.message);
                loadingOverlay.style.display = 'none';
                dropZone.style.display = 'flex';
            }
        }

        function scrollPage(delta) {
            const target = Math.max(1, Math.min(totalPages, currentPageNum + delta));
            const el = document.getElementById(`page-container-${target}`);
            if (el) {
                viewerContainer.scrollTo({
                    top: el.offsetTop - 20,
                    behavior: 'smooth'
                });
            }
        }

        // Track current page on scroll
        viewerContainer.addEventListener('scroll', () => {
            if (!totalPages) return;
            const viewportMiddle = viewerContainer.scrollTop + viewerContainer.clientHeight / 2;
            let targetPage = 1;
            for(let i=1; i<=totalPages; i++) {
                const el = document.getElementById(`page-container-${i}`);
                if (el && el.offsetTop <= viewportMiddle) targetPage = i;
            }
            if (targetPage !== currentPageNum) {
                currentPageNum = targetPage;
                document.getElementById('page-counter').textContent = `${currentPageNum} / ${totalPages}`;
            }
        });

        async function renderAllPages(autoGen = true, restoredSystemsData = null) {
            loadingOverlay.style.display = 'flex';
            viewerContainer.innerHTML = '';
            allPageData = [];
            if (autoGen) { markers = []; activeMarkerIndex = -1; }
            
            let tempMeasure = currentMeasure;

            for (let i = 1; i <= totalPages; i++) {
                loadingText.textContent = `載入中 ${i} / ${totalPages} 頁...`;
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale });
                const container = document.createElement('div');
                container.className = 'page-container';
                container.id = `page-container-${i}`;
                container.style.width = viewport.width + 'px'; container.style.height = viewport.height + 'px';
                const canvas = document.createElement('canvas');
                canvas.className = 'page-canvas'; canvas.width = viewport.width; canvas.height = viewport.height;
                container.appendChild(canvas);
                const layer = document.createElement('div');
                layer.className = 'interaction-layer';
                container.appendChild(layer);
                viewerContainer.appendChild(container);
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                
                let systems = [];
                if (restoredSystemsData && restoredSystemsData[i]) {
                    systems = restoredSystemsData[i];
                } else {
                    systems = await detectSystemsForPage(page, viewport);
                }
                
                allPageData[i] = { width: viewport.width, height: viewport.height, systems };
                
                if (autoGen) {
                    systems.forEach(s => {
                        markers.push({ page: i, x: 0.05, y: (s.staffTop + s.staffBottom) / 2, section: currentSection, value: tempMeasure });
                        tempMeasure += step;
                    });
                }

                layer.onmousedown = (e) => handleLayerInteraction(e, i, 'down');
                layer.onmousemove = (e) => handleLayerInteraction(e, i, 'move');
                layer.onmouseup = (e) => handleLayerInteraction(e, i, 'up');
                layer.onclick = (e) => handleManualClick(e, i);

                renderSystemGuidesForPage(i);
                renderMarkersForPage(i);
            }
            loadingOverlay.style.display = 'none';
            if (markers.length > 0) focusMarker(0);
        }

        async function detectSystemsForPage(page, viewport) {
            const canvasDetect = document.createElement('canvas');
            canvasDetect.width = viewport.width; canvasDetect.height = viewport.height;
            const ctx = canvasDetect.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
            const imgData = ctx.getImageData(0, 0, canvasDetect.width, canvasDetect.height);
            const gray = new Uint8Array(imgData.width * imgData.height);
            for(let i=0; i<imgData.data.length; i+=4) gray[i/4] = imgData.data[i]*0.299 + imgData.data[i+1]*0.587 + imgData.data[i+2]*0.114;
            const result = BarlineStaffDetector.detect(gray, imgData.width, imgData.height, { darkThreshold: 170 });
            const systems = BarlineStaffDetector.detectSystems(gray, imgData.width, imgData.height, 170, { staffSegs: result.segments, highDens: 0.25 });
            return systems.map(s => ({
                top: s.top / imgData.height, bottom: s.bottom / imgData.height,
                staffTop: (s.anchor ? s.anchor.top : s.top + 5) / imgData.height,
                staffBottom: (s.anchor ? s.anchor.bottom : s.bottom - 5) / imgData.height
            }));
        }

        function renderSystemGuidesForPage(pageNum) {
            const layer = document.getElementById(`page-container-${pageNum}`).querySelector('.interaction-layer');
            layer.querySelectorAll('.system-guide').forEach(g => g.remove());
            allPageData[pageNum].systems.forEach((s, idx) => {
                const guide = document.createElement('div');
                guide.className = 'system-guide';
                guide.style.top = (s.staffTop * 100) + '%';
                guide.style.height = ((s.staffBottom - s.staffTop) * 100) + '%';
                guide.style.display = 'block';
                guide.style.pointerEvents = systemMode ? 'auto' : 'none';
                guide.style.cursor = systemMode ? 'move' : 'none';
                
                // Drag to move system
                guide.onmousedown = (e) => {
                    if (!systemMode) return;
                    e.stopPropagation(); 
                    if (e.button === 0) {
                        initSystemDrag(e, s, guide, pageNum);
                    }
                };

                guide.ontouchstart = (e) => {
                    if (!systemMode) return;
                    e.stopPropagation();
                    initSystemDrag(e.touches[0], s, guide, pageNum);
                };

                // Double click to delete
                guide.ondblclick = (e) => {
                    if (!systemMode) return;
                    e.stopPropagation();
                    allPageData[pageNum].systems.splice(idx, 1);
                    renderSystemGuidesForPage(pageNum);
                    saveState();
                };

                // Add a visible delete button on the right
                if (systemMode) {
                    const delBtn = document.createElement('div');
                    delBtn.innerHTML = '×';
                    delBtn.style.cssText = `
                        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
                        width: 24px; height: 24px; background: #ef4444; color: white;
                        border-radius: 50%; display: flex; align-items: center; justify-content: center;
                        font-weight: bold; font-size: 16px; cursor: pointer; pointer-events: auto;
                        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4); z-index: 100;
                    `;
                    delBtn.onclick = (e) => {
                        e.preventDefault(); e.stopPropagation();
                        allPageData[pageNum].systems.splice(idx, 1);
                        renderSystemGuidesForPage(pageNum);
                        saveState();
                    };
                    guide.appendChild(delBtn);
                }

                layer.appendChild(guide);
            });

            // Prevent context menu to avoid interference, but we don't rely on it anymore
            layer.oncontextmenu = (e) => { if (systemMode) e.preventDefault(); };
        }

        function initSystemDrag(e, system, el, pageNum) {
            const startY = e.clientY;
            const initialStaffTop = system.staffTop;
            const initialStaffBottom = system.staffBottom;
            const initialTop = system.top;
            const initialBottom = system.bottom;
            
            const layer = el.parentElement;
            const rect = layer.getBoundingClientRect();
            const startYPercent = (startY - rect.top) / rect.height;

            const onMove = (mv) => {
                const currentY = mv.touches ? mv.touches[0].clientY : mv.clientY;
                const currentYPercent = (currentY - rect.top) / rect.height;
                const delta = currentYPercent - startYPercent;

                system.staffTop = initialStaffTop + delta;
                system.staffBottom = initialStaffBottom + delta;
                system.top = initialTop + delta;
                system.bottom = initialBottom + delta;

                el.style.top = (system.staffTop * 100) + '%';
                // Height stays same
            };

            const onEnd = () => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
                saveState();
            };

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }

        function renderMarkersForPage(pageNum) {
            const layer = document.getElementById(`page-container-${pageNum}`).querySelector('.interaction-layer');
            layer.querySelectorAll('.measure-marker').forEach(m => m.remove());
            markers.forEach((m, idx) => {
                if (m.page !== pageNum) return;
                const el = document.createElement('div');
                el.className = 'measure-marker' + (idx === activeMarkerIndex ? ' active' : '');
                el.textContent = m.section ? `${m.section} - ${m.value}` : m.value;
                el.style.left = (m.x * 100) + '%'; el.style.top = (m.y * 100) + '%';
                
                el.onclick = (e) => { e.stopPropagation(); focusMarker(idx); };
                el.onmousedown = (e) => { 
                    if (e.button === 0) { e.stopPropagation(); initDrag(e, m, el, pageNum, idx); }
                };
                el.ontouchstart = (e) => { e.stopPropagation(); initDrag(e.touches[0], m, el, pageNum, idx); };
                
                // Right-click to delete
                el.oncontextmenu = (e) => {
                    e.preventDefault(); e.stopPropagation();
                    activeMarkerIndex = idx; deleteActiveMarker();
                };

                layer.appendChild(el);
            });
        }

        function focusMarker(index) {
            if (index < 0 || index >= markers.length) return;
            activeMarkerIndex = index;
            const m = markers[index];
            currentSection = m.section; currentMeasure = m.value;
            isNewInput = true; updateNumDisplay();
            for(let i=1; i<=totalPages; i++) renderMarkersForPage(i);
            const container = document.getElementById(`page-container-${m.page}`);
            const markerEls = Array.from(container.querySelectorAll('.measure-marker'));
            const targetEl = markerEls.find(el => el.textContent === (m.section ? `${m.section} - ${m.value}` : m.value.toString()));
            if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('nav-info').textContent = `標記 ${index + 1} / ${markers.length}`;
        }

        function navigateMarker(dir) {
            let next = activeMarkerIndex + dir;
            if (next >= 0 && next < markers.length) focusMarker(next);
        }

        function toggleAddMode() {
            addMode = !addMode;
            if (addMode) systemMode = false;
            updateModeUI();
        }

        function toggleSystemMode() {
            systemMode = !systemMode;
            if (systemMode) addMode = false;
            updateModeUI();
        }

        function updateModeUI() {
            const btnAdd = document.getElementById('btn-add-mode');
            const btnSys = document.getElementById('btn-system-mode');
            
            btnAdd.style.background = addMode ? 'var(--primary)' : 'transparent';
            btnAdd.style.color = addMode ? 'white' : 'var(--text)';
            
            btnSys.style.background = systemMode ? 'var(--primary)' : 'transparent';
            btnSys.style.color = systemMode ? 'white' : 'var(--text)';
            
            document.querySelectorAll('.interaction-layer').forEach(l => {
                if (systemMode) l.style.cursor = 'ns-resize';
                else if (addMode) l.style.cursor = 'copy';
                else l.style.cursor = 'crosshair';
            });
            
            for(let i=1; i<=totalPages; i++) renderSystemGuidesForPage(i);
        }

        function handleLayerInteraction(e, pageNum, phase) {
            if (!systemMode) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const y = (e.clientY - rect.top) / rect.height;

            if (phase === 'down' && e.button === 0) {
                dragBox = { startY: y, element: document.createElement('div') };
                dragBox.element.className = 'system-guide';
                dragBox.element.style.top = (y * 100) + '%';
                dragBox.element.style.height = '0%';
                dragBox.element.style.background = 'rgba(34, 211, 238, 0.4)';
                dragBox.element.style.border = '2px dashed #22d3ee';
                e.currentTarget.appendChild(dragBox.element);
            } 
            else if (phase === 'move' && dragBox) {
                const top = Math.min(y, dragBox.startY);
                const height = Math.abs(y - dragBox.startY);
                dragBox.element.style.top = (top * 100) + '%';
                dragBox.element.style.height = (height * 100) + '%';
            } 
            else if (phase === 'up' && dragBox) {
                const top = Math.min(y, dragBox.startY);
                const bottom = Math.max(y, dragBox.startY);
                if (Math.abs(bottom - top) > 0.005) {
                    allPageData[pageNum].systems.push({
                        top: top, bottom: bottom, staffTop: top, staffBottom: bottom
                    });
                    allPageData[pageNum].systems.sort((a, b) => a.top - b.top);
                }
                dragBox.element.remove();
                dragBox = null;
                renderSystemGuidesForPage(pageNum);
                saveState();
            }
        }

        function handleManualClick(e, pageNum) {
            if (dragTarget || dragBox || systemMode) return;
            if (!e.shiftKey && !addMode) return;

            const rect = e.currentTarget.getBoundingClientRect();
            let x = (e.clientX - rect.left) / rect.width, y = (e.clientY - rect.top) / rect.height;
            const data = allPageData[pageNum];
            const closestSystem = data.systems.find(s => y >= s.top && y <= s.bottom);
            if (closestSystem) y = (closestSystem.staffTop + closestSystem.staffBottom) / 2;
            
            markers.push({ page: pageNum, x, y, section: currentSection, value: currentMeasure });
            markers.sort((a, b) => a.page !== b.page ? a.page - b.page : a.y - b.y);
            renderMarkersForPage(pageNum);
            focusMarker(markers.findIndex(m => m.page === pageNum && m.y === y && m.x === x));
            saveState();
            if (addMode) toggleAddMode();
        }

        function rippleRecalculate() {
            if (activeMarkerIndex < 0) return;
            let val = markers[activeMarkerIndex].value;
            let sec = markers[activeMarkerIndex].section;
            for (let i = activeMarkerIndex + 1; i < markers.length; i++) {
                val += step;
                markers[i].value = val; markers[i].section = sec;
            }
            for (let i = 1; i <= totalPages; i++) renderMarkersForPage(i);
            updateNumDisplay(); saveState();
        }

        async function recalculatePage() {
            if (!confirm("確定要重新偵測並計算本頁的小節標記嗎？")) return;
            
            // 1. Determine starting measure for this page
            // Find markers on PREVIOUS pages
            let prevMarkers = markers.filter(m => m.page < currentPageNum);
            let startMeasure = 1;
            let startSection = currentSection;

            if (prevMarkers.length > 0) {
                prevMarkers.sort((a, b) => a.page !== b.page ? a.page - b.page : a.y - b.y);
                const lastPrev = prevMarkers[prevMarkers.length - 1];
                startMeasure = lastPrev.value + step;
                startSection = lastPrev.section;
            } else {
                // If it's the first page with markers, use the current input's first value
                // Find if there's any marker on this page currently to get its original start value
                let currentPageMarkers = markers.filter(m => m.page === currentPageNum);
                if (currentPageMarkers.length > 0) {
                    currentPageMarkers.sort((a, b) => a.y - b.y);
                    startMeasure = currentPageMarkers[0].value;
                    startSection = currentPageMarkers[0].section;
                } else {
                    startMeasure = currentMeasure;
                    startSection = currentSection;
                }
            }

            // 2. Clear current page markers
            markers = markers.filter(m => m.page !== currentPageNum);
            
            // 3. Re-generate markers based on EXISTING systems (which might have been manually adjusted)
            const systems = allPageData[currentPageNum].systems;
            if (systems && systems.length > 0) {
                systems.forEach(s => {
                    markers.push({ 
                        page: currentPageNum, 
                        x: 0.05, 
                        y: (s.staffTop + s.staffBottom) / 2, 
                        section: startSection, 
                        value: startMeasure 
                    });
                    startMeasure += step;
                });
            } else {
                // If no systems, maybe try re-detecting once
                loadingOverlay.style.display = 'flex';
                loadingText.textContent = `重新偵測第 ${currentPageNum} 頁譜表...`;
                const page = await pdfDoc.getPage(currentPageNum);
                const viewport = page.getViewport({ scale });
                const newSystems = await detectSystemsForPage(page, viewport);
                allPageData[currentPageNum].systems = newSystems;
                loadingOverlay.style.display = 'none';
                
                newSystems.forEach(s => {
                    markers.push({ 
                        page: currentPageNum, 
                        x: 0.05, 
                        y: (s.staffTop + s.staffBottom) / 2, 
                        section: startSection, 
                        value: startMeasure 
                    });
                    startMeasure += step;
                });
            }

            // 4. Sort and Ripple
            markers.sort((a, b) => a.page !== b.page ? a.page - b.page : a.y - b.y);
            
            const firstNewIndex = markers.findIndex(m => m.page === currentPageNum);
            if (firstNewIndex >= 0) {
                focusMarker(firstNewIndex);
                rippleRecalculate(); // This will also handle markers on subsequent pages
            } else {
                for (let i = 1; i <= totalPages; i++) renderMarkersForPage(i);
                updateNumDisplay();
            }

            saveState();
            document.getElementById('nav-info').textContent = markers.length > 0 ? `標記 ${activeMarkerIndex + 1} / ${markers.length}` : "無標記";
        }

        function deleteActiveMarker() {
            if (activeMarkerIndex < 0) return;
            const p = markers[activeMarkerIndex].page;
            markers.splice(activeMarkerIndex, 1);
            activeMarkerIndex = Math.min(activeMarkerIndex, markers.length - 1);
            renderMarkersForPage(p);
            if (markers.length > 0 && activeMarkerIndex >= 0) focusMarker(activeMarkerIndex);
            else {
                document.getElementById('nav-info').textContent = "無標記";
                updateNumDisplay();
            }
            saveState();
        }

        function setActiveField(field) {
            activeField = field;
            document.getElementById('section-display').classList.toggle('active', field === 'section');
            document.getElementById('measure-display').classList.toggle('active', field === 'measure');
            isNewInput = true; updateNumDisplay();
        }

        function appendNum(n) {
            if (activeField === 'measure') {
                if (isNewInput) { currentMeasure = n; isNewInput = false; }
                else { currentMeasure = parseInt(currentMeasure.toString() + n.toString()); }
            } else {
                if (isNewInput) { currentSection = n.toString(); isNewInput = false; }
                else { currentSection += n.toString(); }
            }
            if (activeMarkerIndex >= 0) {
                markers[activeMarkerIndex].value = currentMeasure;
                markers[activeMarkerIndex].section = currentSection;
                rippleRecalculate();
            }
            updateNumDisplay(); saveState();
        }

        function clearNum() {
            if (activeField === 'measure') currentMeasure = 0; else currentSection = "";
            isNewInput = true; 
            if (activeMarkerIndex >= 0) { markers[activeMarkerIndex].value = currentMeasure; markers[activeMarkerIndex].section = currentSection; rippleRecalculate(); }
            updateNumDisplay(); saveState();
        }

        function backspaceNum() {
            if (activeField === 'measure') {
                let s = currentMeasure.toString(); s = s.slice(0, -1);
                currentMeasure = s === "" ? 0 : parseInt(s);
            } else { currentSection = currentSection.slice(0, -1); }
            if (activeMarkerIndex >= 0) { markers[activeMarkerIndex].value = currentMeasure; markers[activeMarkerIndex].section = currentSection; rippleRecalculate(); }
            updateNumDisplay(); saveState();
        }

        let alignRange = 'single'; // 'single' | 'page' | 'all'

        function setAlignRange(r) {
            alignRange = r;
            document.querySelectorAll('.btn-range').forEach(b => b.classList.toggle('active', b.id === `range-${r}`));
        }

        function shiftX(delta) {
            // Use active marker page if focused, otherwise fall back to currently visible page
            const activePage = (activeMarkerIndex >= 0 && markers[activeMarkerIndex]) ? markers[activeMarkerIndex].page : currentPageNum;

            markers.forEach((m, idx) => {
                let shouldMove = false;
                if (alignRange === 'all') shouldMove = true;
                else if (alignRange === 'page' && m.page === activePage) shouldMove = true;
                else if (alignRange === 'single' && idx === activeMarkerIndex) shouldMove = true;

                if (shouldMove) {
                    m.x = Math.max(0, Math.min(1, m.x + delta));
                }
            });

            // Re-render all affected pages
            for(let i=1; i<=totalPages; i++) renderMarkersForPage(i);

            // Update UI display
            if (activeMarkerIndex >= 0) {
                document.getElementById('x-display').textContent = Math.round(markers[activeMarkerIndex].x * 100) + '%';
            }

            saveState();
        }

        function updateNumDisplay() {
            const sectionEl = document.getElementById('section-display');
            const measureEl = document.getElementById('measure-display');
            const nextSecEl = document.getElementById('next-section-preview');
            const nextMeaEl = document.getElementById('next-measure-preview');
            const xDispEl = document.getElementById('x-display');

            if (sectionEl) sectionEl.textContent = currentSection || "-";
            if (measureEl) measureEl.textContent = currentMeasure;
            if (nextSecEl) nextSecEl.textContent = currentSection || "-";
            if (nextMeaEl) nextMeaEl.textContent = currentMeasure + step;
            
            if (xDispEl) {
                if (activeMarkerIndex >= 0 && markers[activeMarkerIndex]) {
                    xDispEl.textContent = Math.round(markers[activeMarkerIndex].x * 100) + '%';
                } else {
                    xDispEl.textContent = "-";
                }
            }
        }

        function adjustStep(d) {
            step = Math.max(1, step + d);
            document.getElementById('step-value').textContent = step;
            if (activeMarkerIndex >= 0) rippleRecalculate();
            updateNumDisplay(); saveState();
        }

        function initDrag(e, marker, el, pageNum, idx) {
            dragTarget = { marker, element: el, pageNum }; focusMarker(idx);
            
            const layer = el.parentElement;
            if (!layer) return;
            
            const onMove = (mv) => {
                if (mv.touches && mv.touches.length > 0) {
                    // Use preventDefault to stop scrolling while dragging
                    mv.preventDefault();
                }
                
                const clientX = mv.touches ? mv.touches[0].clientX : mv.clientX;
                const clientY = mv.touches ? mv.touches[0].clientY : mv.clientY;
                
                if (!layer) return;
                const r = layer.getBoundingClientRect();
                if (!r) return;
                marker.x = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
                marker.y = Math.max(0, Math.min(1, (clientY - r.top) / r.height));
                
                el.style.left = (marker.x * 100) + '%'; 
                el.style.top = (marker.y * 100) + '%';
            };

            const onEnd = () => {
                document.removeEventListener('mousemove', onMove); 
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
                
                setTimeout(() => { dragTarget = null; }, 50); 
                saveState();
            };

            document.addEventListener('mousemove', onMove, { passive: false });
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }

        async function exportPdf() {
            try {
                loadingOverlay.style.display = 'flex'; loadingText.textContent = '正在生成 PDF...';
                await new Promise(r => setTimeout(r, 100));
                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                const pdfDocLib = await PDFDocument.load(pdfBytes);
                const pages = pdfDocLib.getPages();
                const font = await pdfDocLib.embedFont(StandardFonts.HelveticaBold);
                for (const m of markers) {
                    const page = pages[m.page - 1]; const { width, height } = page.getSize();
                    const px = m.x * width; const py = height - (m.y * height);
                    if (isNaN(px) || isNaN(py)) continue;
                    const txt = m.section ? `${m.section} - ${m.value}` : m.value.toString();
                    page.drawText(txt, { x: px, y: py, size: 10, font, color: rgb(0, 0, 0) });
                }
                const blob = new Blob([await pdfDocLib.save()], { type: 'application/pdf' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = document.getElementById('file-name').textContent.replace('.pdf', '_numbered.pdf');
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                loadingOverlay.style.display = 'none';
            } catch (err) { alert("導出錯誤: " + err.message); loadingOverlay.style.display = 'none'; }
        }

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; dropZone.style.background = 'rgba(99, 102, 241, 0.05)'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; dropZone.style.background = 'var(--bg)'; });
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
    </script>
