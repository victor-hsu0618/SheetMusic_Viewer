<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreFlow SMuFL Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Bravura';
            src: url('https://cdn.jsdelivr.net/gh/steinbergmedia/bravura@master/redist/woff/Bravura.woff') format('woff');
        }

        :root {
            --paper: #ffffff;
            --ink: #1e293b;
            --accent: #6366f1;
            --border: #e2e8f0;
            --bg-soft: #f8fafc;
        }

        body {
            background: #f1f5f9;
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            padding: 0;
            margin: 0;
        }

        .app-shell {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: #f1f5f9;
        }

        .sidebar-hd {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-hd h1 {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .sidebar-nav {
            padding: 12px;
            flex: 1;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: #f1f5f9;
            color: var(--ink);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
        }

        .top-controls {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.85);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            padding: 16px 40px;
            border-bottom: 1px solid var(--border);
            margin: -40px -40px 40px -40px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            margin-top: 32px;
        }

        .section-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .symbol-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .symbol-card {
            background: var(--paper);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .symbol-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border-color: var(--accent);
        }

        .symbol-icon {
            font-family: 'Bravura';
            font-size: 48px;
            line-height: 1;
        }

        .symbol-label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .symbol-hex {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #94a3b8;
            background: #f8fafc;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .stretch-lab {
            margin-bottom: 40px;
            background: #fff;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .lab-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 16px;
        }

        .lab-canvas {
            height: 140px;
            background: var(--bg-soft);
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .lab-control-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        #smart-bracket-root {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40px;
            color: #1e293b;
        }

        .bracket-hook {
            font-family: 'Bravura';
            font-size: 40px;
            line-height: 0.4;
            flex-shrink: 0;
        }

        .bracket-stem {
            width: 3.5px;
            background: currentColor;
            flex: 1;
            margin: -2px 0;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-hd">
                <h1>Symbol Lab</h1>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
        </aside>
        <main class="main-content">
            <div class="top-controls">
                <h2 id="view-title">Bravura Mastery</h2>
                <div style="display:flex; align-items:center; gap:12px;">
                    <div id="font-status" style="font-size:12px; font-weight:700; color:#94a3b8;">Checking Font...</div>
                    <button class="btn-primary" style="padding:4px 8px; font-size:11px;" onclick="scanRange()">Scan
                        Range E000-E4FF</button>
                    <button class="btn-primary" style="padding:4px 8px; font-size:11px;"
                        onclick="scanRange('ED40', 'EDFF')">Scan Range ED40-EDFF</button>
                </div>
            </div>
            <section class="stretch-lab">
                <div class="section-title">Stretch Lab</div>
                <div class="lab-grid">
                    <div class="lab-canvas">
                        <div id="bracket-distorted" style="font-family:'Bravura'; font-size:60px;">&#xE002;</div>
                    </div>
                    <div class="lab-canvas">
                        <div id="smart-bracket-root" style="height:100px;">
                            <div class="bracket-hook">&#xE002;</div>
                            <div class="bracket-stem"></div>
                            <div class="bracket-hook" style="transform:scaleY(-1);">&#xE002;</div>
                        </div>
                    </div>
                </div>
                <input type="range" id="height-slider" min="60" max="280" value="100" title="Adjust Bracket Height">
            </section>
            <div id="content-area"></div>
        </main>
    </div>
    <script id="main-script">
        const TOOLSETS = [
            {
                name: 'Clefs', color: '#6366f1', tools: [
                    { id: 'g-clef', char: '\uE050', label: 'G Clef' },
                    { id: 'f-clef', char: '\uE062', label: 'F Clef' },
                    { id: 'c-clef', char: '\uE05C', label: 'C Clef' },
                    { id: 'neutral-clef', char: '\uE069', label: 'Neutral' },
                ]
            },
            {
                name: 'Accidentals', color: '#10b981', tools: [
                    { id: 'sharp', char: '\uE262', label: 'Sharp' },
                    { id: 'flat', char: '\uE260', label: 'Flat' },
                    { id: 'natural', char: '\uE261', label: 'Natural' },
                    { id: 'double-sharp', char: '\uE263', label: 'D Sharp' },
                    { id: 'double-flat', char: '\uE264', label: 'D Flat' },
                ]
            },
            {
                name: 'Arabic & Oriental', color: '#f59e0b', tools: [
                    { id: 'arabic-half-sharp', char: '\uE282', label: '1/4 #' },
                    { id: 'arabic-half-flat', char: '\uE280', label: '1/4 b' },
                    { id: 'arabic-3-half-sharp', char: '\uE283', label: '3/4 #' },
                    { id: 'arabic-3-half-flat', char: '\uE281', label: '3/4 b' },
                    { id: 'pers-koron', char: '\uE460', label: 'Koron' },
                    { id: 'pers-sori', char: '\uE461', label: 'Sori' },
                ]
            },
            {
                name: 'Technique', color: '#ec4899', tools: [
                    { id: 'down-bow', char: '\uE610', label: 'Down Bow' },
                    { id: 'up-bow', char: '\uE612', label: 'Up Bow' },
                    { id: 'thumb', char: '\uE624', label: 'Thumb' },
                    { id: 'snap', char: '\uE630', label: 'Snap Pizz.' },
                    { id: 'open_string', char: 'o', label: 'o' },
                ]
            }
        ];

        function init() {
            document.fonts.load('1em Bravura').then(() => {
                document.getElementById('font-status').textContent = 'Bravura Loaded ✓';
                document.getElementById('font-status').style.color = '#10b981';
            });

            renderSidebar();
            renderCategory(TOOLSETS[0].name);

            document.getElementById('height-slider').addEventListener('input', (e) => {
                document.getElementById('smart-bracket-root').style.height = e.target.value + 'px';
            });
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = TOOLSETS.map(g => `
                <div class="nav-item ${g.name === TOOLSETS[0].name ? 'active' : ''}" onclick="selectCategory('${g.name}', this)">
                    <div class="section-dot" style="background:${g.color}"></div>
                    ${g.name}
                </div>
            `).join('');
        }

        function selectCategory(name, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderCategory(name);
        }

        function renderCategory(name) {
            const group = TOOLSETS.find(g => g.name === name);
            const content = document.getElementById('content-area');
            content.innerHTML = `
                <div class="section-header">
                    <div class="section-dot" style="background:${group.color}"></div>
                    <div class="section-title">${group.name}</div>
                </div>
                <div class="symbol-grid">
                    ${group.tools.map(t => `
                        <div class="symbol-card">
                            <div class="symbol-icon" style="${t.char && t.char.charCodeAt(0) < 0xE000 ? 'font-family:var(--sf-font, inherit);' : ''}">
                                ${t.icon ? `<svg viewBox="0 0 48 48" width="48" height="48">${t.icon}</svg>` : t.char}
                            </div>
                            <div class="symbol-label">${t.label}</div>
                            <div class="symbol-hex">${t.char ? `U+${t.char.charCodeAt(0).toString(16).toUpperCase()}` : 'SVG'}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function scanRange(startHex = 'E000', endHex = 'E4FF') {
            const start = parseInt(startHex, 16);
            const end = parseInt(endHex, 16);
            const content = document.getElementById('content-area');
            let html = `<div class="section-title" style="margin-top:20px;">Scan Results: U+${startHex} - U+${endHex}</div><div class="symbol-grid">`;
            for (let i = start; i <= end; i++) {
                const char = String.fromCharCode(i);
                html += `
                    <div class="symbol-card">
                        <div class="symbol-icon">${char}</div>
                        <div class="symbol-label">U+${i.toString(16).toUpperCase()}</div>
                    </div>
                `;
            }
            html += `</div>`;
            content.innerHTML = html;
        }

        init();
    </script>
</body>

</html>
