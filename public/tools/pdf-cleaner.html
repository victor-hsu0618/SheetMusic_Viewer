<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Score Cleaner — ScoreFlow Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-styles.css">
    <script src="theme-manager.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 32px 20px; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; }

        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); font-weight: 700; font-size: 13px; text-decoration: none; opacity: 0.8; margin-bottom: 28px; }
        .back-btn:hover { opacity: 1; }
        h1 { font-size: 2rem; font-weight: 800; margin: 0 0 6px; letter-spacing: -0.03em; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
            background: var(--card-bg);
        }
        .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: rgba(99,102,241,0.05); }
        .drop-zone .icon { font-size: 3rem; margin-bottom: 12px; }
        .drop-zone p { color: var(--text-muted); margin: 0; font-size: 14px; }
        .drop-zone strong { color: var(--text); }
        input[type=file] { display: none; }

        /* Controls */
        .controls-bar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: flex-end;
            margin-bottom: 24px;
        }
        .ctrl-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .ctrl-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
        .ctrl-group .val { font-size: 12px; font-weight: 600; color: var(--primary); text-align: right; }
        input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        .ctrl-group select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 6px 10px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }

        .btn {
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: rgba(255,255,255,0.3); }

        /* Progress */
        .progress-wrap { margin-bottom: 16px; display: none; }
        .progress-bar-bg { background: rgba(255,255,255,0.08); border-radius: 99px; height: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.3s; width: 0%; }
        .progress-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }

        /* Preview grid */
        .page-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .page-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }
        .page-card-hd {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .compare-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .compare-wrap canvas {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: block;
            cursor: zoom-in;
        }
        .compare-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 6px;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            border-radius: 8px;
            object-fit: contain;
        }
        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 28px;
            font-size: 28px;
            color: white;
            cursor: pointer;
            opacity: 0.7;
            line-height: 1;
        }
        .lightbox-close:hover { opacity: 1; }

        /* Action bar */
        .action-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .file-info { font-size: 13px; color: var(--text-muted); flex: 1; }
        .file-info strong { color: var(--text); }

        #status-msg { font-size: 13px; color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg>
        返回工具門戶
    </a>

    <h1>🧹 PDF Score Cleaner</h1>
    <p class="subtitle">清除影印樂譜的髒污、灰色背景與雜訊，輸出乾淨的黑白 PDF。</p>

    <!-- Drop Zone -->
    <div class="drop-zone" id="drop-zone">
        <div class="icon">📄</div>
        <strong>拖曳 PDF 到這裡</strong>
        <p style="margin-top:8px;">或點擊選取檔案</p>
        <input type="file" id="file-input" accept=".pdf">
    </div>

    <!-- Controls -->
    <div class="controls-bar" id="controls-bar" style="display:none;">
        <div class="ctrl-group">
            <label>處理模式</label>
            <select id="ctrl-mode">
                <option value="adaptive">自適應二值化（推薦）</option>
                <option value="otsu">Otsu 自動閾值</option>
                <option value="simple">簡單閾值</option>
                <option value="denoise">去雜訊 + 增強</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>閾值 <span class="val" id="val-threshold">128</span></label>
            <input type="range" id="ctrl-threshold" min="80" max="220" value="128" step="1">
        </div>
        <div class="ctrl-group">
            <label>對比增強 <span class="val" id="val-contrast">1.0×</span></label>
            <input type="range" id="ctrl-contrast" min="0.5" max="3" value="1.0" step="0.05">
        </div>
        <div class="ctrl-group">
            <label>去雜訊強度 <span class="val" id="val-denoise">0</span></label>
            <input type="range" id="ctrl-denoise" min="0" max="5" value="0" step="1">
        </div>
        <div class="ctrl-group">
            <label>渲染解析度</label>
            <select id="ctrl-scale">
                <option value="1.5">150 dpi（快）</option>
                <option value="2" selected>200 dpi（推薦）</option>
                <option value="3">300 dpi（高品質）</option>
            </select>
        </div>
        <div class="ctrl-group" style="min-width:200px;">
            <label>五線譜線條加強</label>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);text-transform:none;letter-spacing:0;margin-top:4px;">
                <input type="checkbox" id="ctrl-staff-enhance" style="accent-color:var(--primary);width:15px;height:15px;">
                偵測並加黑線條
            </label>
        </div>
        <div class="ctrl-group" id="staff-density-group" style="display:none;">
            <label>偵測靈敏度 <span class="val" id="val-staff-density">20%</span></label>
            <input type="range" id="ctrl-staff-density" min="5" max="60" value="20" step="1">
        </div>
        <button class="btn btn-primary" id="btn-process">⚡ 重新處理</button>
    </div>

    <!-- Action bar -->
    <div class="action-bar" id="action-bar" style="display:none;">
        <span class="file-info" id="file-info"></span>
        <span id="status-msg"></span>
        <button class="btn btn-outline" id="btn-reset">✕ 重置</button>
        <button class="btn btn-primary" id="btn-download" disabled>↓ 下載清理後 PDF</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap">
        <div class="progress-label" id="progress-label">處理中…</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
    </div>

    <!-- Page Preview Grid -->
    <div class="page-grid" id="page-grid"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">✕</span>
    <img id="lightbox-img" src="" alt="">
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let totalPages = 0;
let processedCanvases = []; // cleaned canvases per page
let originalFile = null;

// ── Drop Zone ──
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file?.type === 'application/pdf') loadPDF(file);
});
fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadPDF(fileInput.files[0]);
});

// ── Sliders ──
const sliders = [
    ['ctrl-threshold', 'val-threshold', v => Math.round(v)],
    ['ctrl-contrast',  'val-contrast',  v => parseFloat(v).toFixed(2) + '×'],
    ['ctrl-denoise',   'val-denoise',   v => Math.round(v)],
];
sliders.forEach(([id, valId, fmt]) => {
    const el = document.getElementById(id);
    const vEl = document.getElementById(valId);
    el.addEventListener('input', () => { vEl.textContent = fmt(el.value); });
});

document.getElementById('ctrl-mode').addEventListener('change', updateControlVisibility);
function updateControlVisibility() {
    const mode = document.getElementById('ctrl-mode').value;
    const thresholdGroup = document.getElementById('ctrl-threshold').closest('.ctrl-group');
    thresholdGroup.style.opacity = (mode === 'simple') ? '1' : '0.4';
}

// ── Load PDF ──
async function loadPDF(file) {
    originalFile = file;
    setStatus('正在載入 PDF…');
    const arrayBuf = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('file-info').innerHTML =
        `<strong>${file.name}</strong> &nbsp;·&nbsp; ${totalPages} 頁 &nbsp;·&nbsp; ${(file.size/1024/1024).toFixed(1)} MB`;
    document.getElementById('controls-bar').style.display = 'flex';
    document.getElementById('action-bar').style.display = 'flex';
    dropZone.style.display = 'none';
    await processAll();
}

// ── Process All Pages ──
async function processAll() {
    if (!pdfDoc) return;
    processedCanvases = [];
    const grid = document.getElementById('page-grid');
    grid.innerHTML = '';
    document.getElementById('btn-download').disabled = true;
    showProgress(true);

    const scale = parseFloat(document.getElementById('ctrl-scale').value);
    const mode = document.getElementById('ctrl-mode').value;
    const threshold = parseInt(document.getElementById('ctrl-threshold').value);
    const contrast = parseFloat(document.getElementById('ctrl-contrast').value);
    const denoiseRadius = parseInt(document.getElementById('ctrl-denoise').value);
    const staffEnhance = document.getElementById('ctrl-staff-enhance').checked;
    const staffDensity = parseInt(document.getElementById('ctrl-staff-density').value) / 100;

    for (let i = 1; i <= totalPages; i++) {
        setProgress(((i - 1) / totalPages) * 100, `處理第 ${i} / ${totalPages} 頁…`);

        const page = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale });

        // Render original
        const origCanvas = document.createElement('canvas');
        origCanvas.width = viewport.width;
        origCanvas.height = viewport.height;
        await page.render({ canvasContext: origCanvas.getContext('2d'), viewport }).promise;

        // Clean
        const cleanCanvas = document.createElement('canvas');
        cleanCanvas.width = origCanvas.width;
        cleanCanvas.height = origCanvas.height;
        const cleanCtx = cleanCanvas.getContext('2d');
        cleanCtx.drawImage(origCanvas, 0, 0);
        const imageData = cleanCtx.getImageData(0, 0, cleanCanvas.width, cleanCanvas.height);
        processPixels(imageData, mode, threshold, contrast, denoiseRadius);
        if (staffEnhance) enhanceStaffLines(imageData, staffDensity);
        cleanCtx.putImageData(imageData, 0, 0);

        processedCanvases.push(cleanCanvas);

        // Card
        const card = document.createElement('div');
        card.className = 'page-card';
        card.innerHTML = `
            <div class="page-card-hd">
                <span>第 ${i} 頁</span>
                <span>${Math.round(viewport.width)} × ${Math.round(viewport.height)} px</span>
            </div>
            <div class="compare-wrap">
                <div>
                    <div class="compare-label">原始</div>
                    <canvas id="orig-${i}"></canvas>
                </div>
                <div>
                    <div class="compare-label">清理後</div>
                    <canvas id="clean-${i}"></canvas>
                </div>
            </div>`;
        grid.appendChild(card);

        // Draw thumbnails (scaled down for display)
        drawThumb(origCanvas,  document.getElementById(`orig-${i}`));
        drawThumb(cleanCanvas, document.getElementById(`clean-${i}`));

        // Let browser breathe
        await new Promise(r => setTimeout(r, 0));
    }

    setProgress(100, '處理完成！');
    setTimeout(() => showProgress(false), 800);
    document.getElementById('btn-download').disabled = false;
    setStatus(`✓ ${totalPages} 頁處理完成`);
}

function drawThumb(src, dst) {
    const maxW = 1200;
    const ratio = Math.min(1, maxW / src.width);
    dst.width  = Math.round(src.width  * ratio);
    dst.height = Math.round(src.height * ratio);
    dst.getContext('2d').drawImage(src, 0, 0, dst.width, dst.height);
    // Click to open lightbox
    dst.addEventListener('click', () => {
        document.getElementById('lightbox-img').src = dst.toDataURL('image/jpeg', 0.95);
        document.getElementById('lightbox').classList.add('open');
    });
}

// Lightbox close
document.getElementById('lightbox').addEventListener('click', closeLightbox);
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── Image Processing ──
function processPixels(imageData, mode, threshold, contrast, denoiseR) {
    const d = imageData.data;
    const w = imageData.width;
    const h = imageData.height;

    // 1. Grayscale
    for (let i = 0; i < d.length; i += 4) {
        const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        d[i] = d[i+1] = d[i+2] = gray;
    }

    // 2. Contrast stretch
    if (contrast !== 1.0) {
        for (let i = 0; i < d.length; i += 4) {
            const v = Math.min(255, Math.max(0, (d[i] - 128) * contrast + 128));
            d[i] = d[i+1] = d[i+2] = v;
        }
    }

    // 3. Denoise (simple median-like box blur on gray channel)
    if (denoiseR > 0) {
        const size = denoiseR * 2 + 1;
        const temp = new Uint8ClampedArray(w * h);
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                let sum = 0, count = 0;
                for (let dy = -denoiseR; dy <= denoiseR; dy++) {
                    for (let dx = -denoiseR; dx <= denoiseR; dx++) {
                        const ny = y + dy, nx = x + dx;
                        if (ny >= 0 && ny < h && nx >= 0 && nx < w) {
                            sum += d[(ny * w + nx) * 4];
                            count++;
                        }
                    }
                }
                temp[y * w + x] = sum / count;
            }
        }
        for (let i = 0; i < w * h; i++) {
            d[i*4] = d[i*4+1] = d[i*4+2] = temp[i];
        }
    }

    // 4. Thresholding
    if (mode === 'simple') {
        for (let i = 0; i < d.length; i += 4) {
            const v = d[i] < threshold ? 0 : 255;
            d[i] = d[i+1] = d[i+2] = v;
        }
    } else if (mode === 'otsu') {
        const t = otsuThreshold(d);
        for (let i = 0; i < d.length; i += 4) {
            const v = d[i] < t ? 0 : 255;
            d[i] = d[i+1] = d[i+2] = v;
        }
    } else if (mode === 'adaptive') {
        adaptiveThreshold(d, w, h, 31);
    } else if (mode === 'denoise') {
        // Gentle: just boost contrast, no hard threshold
        for (let i = 0; i < d.length; i += 4) {
            const v = Math.min(255, Math.max(0, (d[i] - 100) * 1.8 + 100));
            d[i] = d[i+1] = d[i+2] = v;
        }
    }
}

function otsuThreshold(d) {
    const hist = new Array(256).fill(0);
    const total = d.length / 4;
    for (let i = 0; i < d.length; i += 4) hist[d[i]]++;
    let sum = 0;
    for (let t = 0; t < 256; t++) sum += t * hist[t];
    let sumB = 0, wB = 0, max = 0, best = 128;
    for (let t = 0; t < 256; t++) {
        wB += hist[t];
        if (!wB) continue;
        const wF = total - wB;
        if (!wF) break;
        sumB += t * hist[t];
        const mB = sumB / wB;
        const mF = (sum - sumB) / wF;
        const between = wB * wF * (mB - mF) ** 2;
        if (between > max) { max = between; best = t; }
    }
    return best;
}

function adaptiveThreshold(d, w, h, blockSize) {
    const half = Math.floor(blockSize / 2);
    const gray = new Uint8ClampedArray(w * h);
    for (let i = 0; i < w * h; i++) gray[i] = d[i * 4];

    // Integral image for fast block mean
    const integral = new Float64Array((w + 1) * (h + 1));
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            integral[(y+1)*(w+1)+(x+1)] = gray[y*w+x]
                + integral[y*(w+1)+(x+1)]
                + integral[(y+1)*(w+1)+x]
                - integral[y*(w+1)+x];
        }
    }

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const x1 = Math.max(0, x - half), y1 = Math.max(0, y - half);
            const x2 = Math.min(w, x + half + 1), y2 = Math.min(h, y + half + 1);
            const area = (x2 - x1) * (y2 - y1);
            const sum = integral[y2*(w+1)+x2] - integral[y1*(w+1)+x2]
                      - integral[y2*(w+1)+x1] + integral[y1*(w+1)+x1];
            const mean = sum / area;
            const v = gray[y*w+x] < mean - 8 ? 0 : 255;
            const idx = (y * w + x) * 4;
            d[idx] = d[idx+1] = d[idx+2] = v;
        }
    }
}

// ── Download PDF ──
document.getElementById('btn-download').onclick = async () => {
    if (!processedCanvases.length) return;
    setStatus('正在生成 PDF…');
    document.getElementById('btn-download').disabled = true;

    const { jsPDF } = window.jspdf;
    const first = processedCanvases[0];
    const isLandscape = first.width > first.height;
    const pdf = new jsPDF({
        orientation: isLandscape ? 'landscape' : 'portrait',
        unit: 'px',
        format: [first.width, first.height],
        hotfixes: ['px_scaling']
    });

    for (let i = 0; i < processedCanvases.length; i++) {
        setStatus(`生成第 ${i+1} / ${processedCanvases.length} 頁…`);
        if (i > 0) {
            const c = processedCanvases[i];
            pdf.addPage([c.width, c.height], c.width > c.height ? 'landscape' : 'portrait');
        }
        const imgData = processedCanvases[i].toDataURL('image/jpeg', 0.92);
        pdf.addImage(imgData, 'JPEG', 0, 0, processedCanvases[i].width, processedCanvases[i].height);
        await new Promise(r => setTimeout(r, 0));
    }

    const outName = (originalFile?.name || 'score').replace(/\.pdf$/i, '') + '_cleaned.pdf';
    pdf.save(outName);
    setStatus('✓ 下載完成');
    document.getElementById('btn-download').disabled = false;
};

// ── Staff Line Enhancement ──
function enhanceStaffLines(imageData, densityThreshold = 0.20) {
    const d = imageData.data;
    const w = imageData.width;
    const h = imageData.height;
    const margin = Math.floor(w * 0.05);
    const scanLeft = margin, scanRight = w - margin;
    const sampleStep = 2;

    // 1. Row density scan
    const rowDensity = new Float32Array(h);
    for (let y = 0; y < h; y++) {
        let dark = 0, total = 0;
        for (let x = scanLeft; x < scanRight; x += sampleStep) {
            if (d[(y * w + x) * 4] < 128) dark++;
            total++;
        }
        rowDensity[y] = dark / total;
    }

    // 2. Candidate rows
    const candidates = [];
    for (let y = 0; y < h; y++) {
        if (rowDensity[y] >= densityThreshold) candidates.push(y);
    }

    // 3. Cluster into segments (max thickness 12px to avoid notes/text)
    const segments = [];
    let i = 0;
    while (i < candidates.length) {
        let start = candidates[i], end = start;
        while (i < candidates.length && candidates[i] <= end + 2) { end = candidates[i]; i++; }
        const thick = end - start + 1;
        if (thick <= 12) segments.push({ top: start, bottom: end });
    }

    // 4. Paint each detected staff line fully black across entire width
    segments.forEach(seg => {
        for (let y = seg.top; y <= seg.bottom; y++) {
            for (let x = 0; x < w; x++) {
                const idx = (y * w + x) * 4;
                d[idx] = d[idx+1] = d[idx+2] = 0;
                d[idx+3] = 255;
            }
        }
    });
}

// ── Controls ──
document.getElementById('ctrl-staff-enhance').addEventListener('change', function() {
    document.getElementById('staff-density-group').style.display = this.checked ? 'flex' : 'none';
});
document.getElementById('ctrl-staff-density').addEventListener('input', function() {
    document.getElementById('val-staff-density').textContent = this.value + '%';
});
document.getElementById('btn-process').onclick = processAll;
document.getElementById('btn-reset').onclick = () => {
    pdfDoc = null; originalFile = null; processedCanvases = [];
    document.getElementById('page-grid').innerHTML = '';
    document.getElementById('controls-bar').style.display = 'none';
    document.getElementById('action-bar').style.display = 'none';
    dropZone.style.display = '';
    fileInput.value = '';
    setStatus('');
};

// ── Helpers ──
function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }
function showProgress(show) { document.getElementById('progress-wrap').style.display = show ? 'block' : 'none'; }
function setProgress(pct, label) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = label;
}
updateControlVisibility();
</script>
