<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreFlow LAN Debug & Auth Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-styles.css">
    <script src="theme-manager.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --primary: #818cf8;
            --success: #10b981;
            --warn: #f59e0b;
            --error: #ef4444;
            --border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --text-muted: #cbd5e1;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container { max-width: 760px; margin: 0 auto; }

        header {
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        h1 { font-size: 2rem; font-weight: 800; margin: 0; color: #fff; letter-spacing: -0.02em; }
        h1 span { color: var(--primary); }
        p.subtitle { color: var(--text-muted); margin-top: 8px; font-size: 1.1rem; }
        
        .card { 
            background: var(--card-bg); 
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 24px; 
            margin-bottom: 24px; 
        }

        .section-title { 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: var(--primary); 
            margin-bottom: 24px; 
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; color: var(--text); }
        
        textarea {
            width: 100%;
            height: 110px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            padding: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            resize: vertical;
            transition: all 0.2s;
            outline: none;
        }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        textarea[readonly] { opacity: 0.6; cursor: default; }
        
        .btn {
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            gap: 10px;
            font-size: 14px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); filter: brightness(1.1); }
        
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.05); color: #fff; border-color: rgba(255, 255, 255, 0.2); }

        .hint-box {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.1);
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 14px;
            color: #c7d2fe;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .status-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .status-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .status-label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .status-val { font-family: monospace; color: var(--primary); font-weight: 700; font-size: 13px; }

        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 14px 28px; border-radius: 100px;
            font-weight: 700; font-size: 14px; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: none; z-index: 1000;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        code { background: rgba(255, 255, 255, 0.1); padding: 2px 6px; border-radius: 6px; font-family: monospace; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button class="btn btn-outline" style="margin-bottom: 24px;" onclick="window.location.href='index.html'">← 返回工具門戶</button>
            <h1><span>🔑</span> Network & Auth Suite</h1>
            <p class="subtitle">針對跨裝置偵錯與手動權限注入的進階控制中心</p>
        </header>


        <div class="card">
            <div class="section-title">Current Authentication Status</div>
            <div class="status-area" id="auth-status">
                <div class="status-row"><span class="status-label">Sync Enabled</span> <span class="status-val" id="st-enabled">---</span></div>
                <div class="status-row"><span class="status-label">Token Expiry</span> <span class="status-val" id="st-expiry">---</span></div>
                <div class="status-row"><span class="status-label">Author Identity</span> <span class="status-val" id="st-hint">---</span></div>
            </div>
            <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px;">
                <span>⚠️</span> <span>注意：套用 Token 後，請<b>重新整理主程式系統</b>以完成連線。</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">已成功套用！</div>

    <script>
        function updateStatus() {
            const enabled = localStorage.getItem('scoreflow_drive_sync_enabled');
            const token = localStorage.getItem('scoreflow_drive_access_token');
            const expiry = localStorage.getItem('scoreflow_drive_token_expiry');
            const hint = localStorage.getItem('scoreflow_drive_user_hint');

            document.getElementById('current-token').value = token || '';
            document.getElementById('st-enabled').textContent = enabled || 'false';
            
            if (expiry) {
                const date = new Date(parseInt(expiry));
                const diff = Math.round((date - Date.now()) / 60000);
                document.getElementById('st-expiry').textContent = date.toLocaleString() + (diff > 0 ? ` (剩餘 ${diff} 分鐘)` : ' (已過期)');
            } else {
                document.getElementById('st-expiry').textContent = 'None';
            }
            
            document.getElementById('st-hint').textContent = hint || 'None';
        }


        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        window.onload = updateStatus;
    </script>
</body>
</html>
