<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolset Inspector — ScoreFlow Dev Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared-styles.css">
    <script src="theme-manager.js"></script>
    <style>
        nav { margin-bottom: 32px; }
        nav a { text-decoration:none; color:var(--primary); font-weight:700; font-size:14px; display:inline-flex; align-items:center; gap:6px; opacity:0.8; }

        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
        .page-header p { color: var(--text-muted); margin-top: 6px; font-size: 0.9rem; }

        /* ── Tab nav ── */
        .tab-nav { display:flex; gap:8px; margin-bottom:28px; border-bottom:1px solid var(--border); padding-bottom:0; }
        .tab-btn {
            padding: 8px 18px; font-size:13px; font-weight:600; border:none; background:none;
            color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent;
            margin-bottom:-1px; font-family:inherit; transition: color .2s, border-color .2s;
        }
        .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
        .tab-pane { display:none; }
        .tab-pane.active { display:block; }

        /* ── My Panel preview ── */
        .preview-wrap {
            background: #1a1a2e;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .preview-label {
            font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
            color:var(--text-muted); margin-bottom:12px; display:flex; align-items:center; gap:8px;
        }
        .preview-label span { background:var(--primary); color:#fff; border-radius:4px; padding:1px 7px; font-size:9px; }

        /* Mock panel shell */
        .mock-panel-outer {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .mock-panel {
            background: #111827;
            border-radius: 12px;
            padding: 10px 8px;
            min-height: 80px;
            width: 320px;
            flex-shrink: 0;
        }
        .mock-panel-hint {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.7;
            padding-top: 4px;
        }
        .mock-panel-hint b { color: var(--text); }
        .mock-edit-row {
            display: flex;
            gap: 4px;
            padding-bottom: 8px;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
        }
        .mock-stamp-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 44px;
        }
        .mock-cell {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex; align-items:center; justify-content:center;
            cursor: grab;
            position: relative;
            transition: background .15s;
            user-select: none;
        }
        .mock-cell:hover { background: rgba(255,255,255,0.12); }
        .mock-cell.dragging { opacity: .4; }
        .mock-cell.drag-over { border-color: var(--primary); background: rgba(99,102,241,0.15); }
        .mock-cell svg { width:20px; height:20px; flex-shrink:0; }
        .mock-cell .cell-text { font-size:11px; font-weight:600; color:#fff; text-align:center; line-height:1.2; font-family:'JetBrains Mono',monospace; }
        .mock-cell .cell-label {
            position:absolute; bottom:-16px; left:50%; transform:translateX(-50%);
            font-size:9px; color:var(--text-muted); white-space:nowrap;
            opacity:0; transition:opacity .15s; pointer-events:none;
        }
        .mock-cell:hover .cell-label { opacity:1; }
        .mock-cell .remove-btn {
            position:absolute; top:-5px; right:-5px;
            width:14px; height:14px; background:#ef4444; border-radius:50%;
            font-size:9px; color:#fff; display:flex; align-items:center; justify-content:center;
            cursor:pointer; opacity:0; transition:opacity .15s; line-height:1;
            border:none;
        }
        .mock-cell:hover .remove-btn { opacity:1; }
        .mock-cell.edit-cell { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); }

        .empty-hint { color:var(--text-muted); font-size:12px; padding:12px 0; }

        /* ── Stamp selector ── */
        .selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .cat-block {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }
        .cat-block-header {
            display:flex; align-items:center; gap:8px;
            margin-bottom:10px; padding-bottom:8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .cat-block-name { font-size:12px; font-weight:700; flex:1; }
        .select-all-btn {
            font-size:10px; color:var(--primary); cursor:pointer; background:none;
            border:none; font-family:inherit; font-weight:600; padding:2px 6px;
            border-radius:4px;
        }
        .select-all-btn:hover { background: rgba(99,102,241,0.1); }

        .tool-rows { display:flex; flex-direction:column; gap:2px; }
        .tool-row-label { font-size:9px; text-transform:uppercase; letter-spacing:.08em; color:rgba(255,255,255,0.25); margin-top:6px; margin-bottom:2px; }
        .tool-row-items { display:flex; flex-wrap:wrap; gap:4px; }

        .tool-item {
            display:flex; align-items:center; gap:6px;
            padding:4px 8px; border-radius:6px; cursor:pointer;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            transition: background .15s, border-color .15s;
        }
        .tool-item:hover { background: rgba(255,255,255,0.07); }
        .tool-item.selected { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); }
        .tool-item input[type=checkbox] { display:none; }
        .tool-item .ti-icon { width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .tool-item .ti-icon svg { width:16px; height:16px; }
        .tool-item .ti-label { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }
        .tool-item.selected .ti-label { color:var(--text); }

        /* ── State tab ── */
        .status-bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:24px; }
        .status-pill { display:inline-flex; align-items:center; gap:6px; background:var(--card-bg); border:1px solid var(--border); border-radius:99px; padding:5px 14px; font-size:12px; font-weight:600; }
        .dot { width:7px; height:7px; border-radius:50%; }
        .dot.green { background:var(--success); }
        .dot.yellow { background:var(--warn); }
        .dot.gray { background:#64748b; }
        .categories-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); gap:20px; }
        .cat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:20px; }
        .cat-card.active { border-color:rgba(99,102,241,0.5); box-shadow:0 0 0 1px rgba(99,102,241,0.2); }
        .cat-card.hidden-layer { opacity:.5; }
        .cat-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
        .cat-color-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .cat-name { font-size:1rem; font-weight:700; flex:1; }
        .cat-badge { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:2px 8px; border-radius:4px; }
        .badge-active { background:rgba(99,102,241,0.2); color:#818cf8; border:1px solid rgba(99,102,241,0.3); }
        .badge-visible { background:rgba(16,185,129,0.15); color:#34d399; border:1px solid rgba(16,185,129,0.3); }
        .badge-hidden { background:rgba(100,116,139,0.15); color:#94a3b8; border:1px solid rgba(100,116,139,0.3); }
        .badge-edit { background:rgba(245,158,11,0.15); color:#fbbf24; border:1px solid rgba(245,158,11,0.3); }
        .layer-info { display:flex; gap:8px; align-items:center; margin-bottom:12px; padding:6px 10px; background:rgba(255,255,255,0.04); border-radius:8px; font-size:11px; color:var(--text-muted); }
        .layer-info code { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--primary); background:rgba(99,102,241,0.1); padding:1px 5px; border-radius:3px; }
        .tools-list { display:flex; flex-wrap:wrap; gap:6px; }
        .tool-chip { display:inline-flex; align-items:center; gap:4px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:6px; padding:3px 8px; font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }
        .tool-chip-row { font-size:9px; opacity:.5; }
        .summary-row { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:12px; margin-bottom:28px; }
        .summary-card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
        .summary-card .num { font-size:1.8rem; font-weight:800; color:var(--primary); }
        .summary-card .lbl { font-size:11px; color:var(--text-muted); margin-top:2px; }
        .section-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-muted); margin:28px 0 12px; }

        .action-row { display:flex; gap:8px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
        .btn { padding:7px 16px; font-size:12px; font-weight:700; border:none; border-radius:8px; cursor:pointer; font-family:inherit; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-ghost { background:rgba(255,255,255,0.07); color:var(--text); border:1px solid var(--border); }
        .btn:hover { opacity:.85; }
        .save-status { font-size:11px; color:var(--success); margin-left:auto; }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <a href="index.html">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg>
            Dev Hub
        </a>
    </nav>

    <div class="page-header">
        <h1>🗂 Toolset Inspector</h1>
        <p>配置 My Panel 的工具組合，即時預覽面板佈局。</p>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" data-tab="mypanel">My Panel 配置</button>
        <button class="tab-btn" data-tab="state">分類狀態</button>
    </div>

    <!-- ══ TAB: My Panel ══ -->
    <div class="tab-pane active" id="tab-mypanel">

        <!-- Preview -->
        <div class="preview-wrap">
            <div class="preview-label">
                My Panel Preview
                <span id="count-badge">0 stamps</span>
            </div>
            <!-- Mock panel shell -->
            <div class="mock-panel-outer">
                <div class="mock-panel">
                    <div class="mock-edit-row" id="preview-edit"></div>
                    <div class="mock-stamp-grid" id="preview-stamps">
                        <div class="empty-hint">← 從下方勾選 stamp 加入面板</div>
                    </div>
                </div>
                <div class="mock-panel-hint">
                    <b>Panel 寬度：320px</b><br>
                    Cell：44px + 4px gap<br>
                    <b>一行最多 6 個</b><br><br>
                    拖曳 stamp 可調整順序
                </div>
            </div>
        </div>

        <div class="action-row">
            <button class="btn btn-primary" onclick="saveMyPanel()">💾 儲存設定</button>
            <button class="btn btn-ghost" onclick="clearMyPanel()">✕ 清除全部</button>
            <span class="save-status" id="save-status"></span>
        </div>

        <!-- Stamp selector -->
        <div class="section-label">選擇 Stamp（點擊加入 / 取消）</div>
        <div class="selector-grid" id="selector-grid"></div>
    </div>

    <!-- ══ TAB: State ══ -->
    <div class="tab-pane" id="tab-state">
        <div class="status-bar">
            <div class="status-pill"><div class="dot" id="ls-dot"></div><span id="ls-status">讀取中...</span></div>
            <div class="status-pill"><div class="dot" id="active-dot"></div><span id="active-status">—</span></div>
            <button class="btn btn-ghost" style="margin-left:auto" onclick="renderState()">↻ Refresh</button>
        </div>
        <div class="summary-row" id="summary-row"></div>
        <div class="section-label">所有分類 (TOOLSETS)</div>
        <div class="categories-grid" id="categories-grid"></div>
    </div>
</div>

// ─────────────────────────────────────────────────────────────────────────────

const LS_KEY = 'scoreflow_my_panel'

// myPanel = [{ id, category }]  ordered list
let myPanel = []

function loadMyPanel() {
    try {
        myPanel = JSON.parse(localStorage.getItem(LS_KEY) || '[]')
    } catch { myPanel = [] }
}

function saveMyPanel() {
    localStorage.setItem(LS_KEY, JSON.stringify(myPanel))
    const el = document.getElementById('save-status')
    el.textContent = '✓ 已儲存'
    setTimeout(() => el.textContent = '', 2000)
}

function clearMyPanel() {
    myPanel = []
    saveMyPanel()
    renderMyPanel()
    renderSelector()
}

function isSelected(id, category) {
    return myPanel.some(s => s.id === id && s.category === category)
}

function toggleTool(id, category) {
    const idx = myPanel.findIndex(s => s.id === id && s.category === category)
    if (idx === -1) {
        myPanel.push({ id, category })
    } else {
        myPanel.splice(idx, 1)
    }
    saveMyPanel()
    renderMyPanel()
    renderSelector()
}

function removeTool(id, category) {
    myPanel = myPanel.filter(s => !(s.id === id && s.category === category))
    saveMyPanel()
    renderMyPanel()
    renderSelector()
}

// ── Icon rendering helpers ────────────────────────────────────────────────────
function findTool(id, category) {
    const group = TOOLSETS.find(g => g.name === category)
    return group?.tools.find(t => t.id === id)
}

function renderIcon(tool, size = 20) {
    if (!tool) return ''
    if (tool.textIcon) {
        return `<span class="cell-text" style="font-size:${size > 16 ? 12 : 9}px">${tool.textIcon}</span>`
    }
    if (tool.icon) {
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="${size}" height="${size}">${tool.icon}</svg>`
    }
    return `<span class="cell-text" style="font-size:10px">${tool.label}</span>`
}

// ── Preview rendering ─────────────────────────────────────────────────────────
function renderMyPanel() {
    const editGroup = TOOLSETS.find(g => g.type === 'edit')
    const editRow = document.getElementById('preview-edit')
    const stampsGrid = document.getElementById('preview-stamps')
    const countBadge = document.getElementById('count-badge')

    // Edit row (always fixed)
    editRow.innerHTML = ''
    editGroup.tools.forEach(t => {
        const cell = document.createElement('div')
        cell.className = 'mock-cell edit-cell'
        cell.title = t.label
        cell.innerHTML = renderIcon(t, 20) + `<span class="cell-label">${t.label}</span>`
        editRow.appendChild(cell)
    })

    // Stamps grid
    const stampItems = myPanel.filter(s => {
        const group = TOOLSETS.find(g => g.name === s.category)
        return group?.type !== 'edit'
    })

    countBadge.textContent = `${stampItems.length} stamps`

    if (stampItems.length === 0) {
        stampsGrid.innerHTML = '<div class="empty-hint">← 從下方勾選 stamp 加入面板</div>'
        return
    }

    stampsGrid.innerHTML = ''
    let dragSrc = null

    stampItems.forEach((item, idx) => {
        const tool = findTool(item.id, item.category)
        const group = TOOLSETS.find(g => g.name === item.category)
        const cell = document.createElement('div')
        cell.className = 'mock-cell'
        cell.draggable = true
        cell.dataset.idx = idx
        cell.style.borderColor = group?.color ? group.color + '44' : ''
        cell.innerHTML = renderIcon(tool, 20)
            + `<span class="cell-label">${tool?.label || item.id}</span>`
            + `<button class="remove-btn" title="移除">✕</button>`

        cell.querySelector('.remove-btn').addEventListener('click', e => {
            e.stopPropagation()
            removeTool(item.id, item.category)
        })

        // Drag reorder
        cell.addEventListener('dragstart', e => {
            dragSrc = idx
            cell.classList.add('dragging')
            e.dataTransfer.effectAllowed = 'move'
        })
        cell.addEventListener('dragend', () => cell.classList.remove('dragging'))
        cell.addEventListener('dragover', e => {
            e.preventDefault()
            cell.classList.add('drag-over')
        })
        cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'))
        cell.addEventListener('drop', e => {
            e.preventDefault()
            cell.classList.remove('drag-over')
            const destIdx = parseInt(cell.dataset.idx)
            if (dragSrc === null || dragSrc === destIdx) return
            // Reorder within myPanel (only stamp items)
            const stampOrder = myPanel.filter(s => TOOLSETS.find(g => g.name === s.category)?.type !== 'edit')
            const [moved] = stampOrder.splice(dragSrc, 1)
            stampOrder.splice(destIdx, 0, moved)
            // Rebuild myPanel preserving any edit items at start (none currently, but future-proof)
            myPanel = stampOrder
            saveMyPanel()
            renderMyPanel()
        })

        stampsGrid.appendChild(cell)
    })
}

// ── Selector rendering ────────────────────────────────────────────────────────
function renderSelector() {
    const grid = document.getElementById('selector-grid')
    grid.innerHTML = ''

    TOOLSETS.forEach(group => {
        if (group.type === 'edit') return // Edit is always fixed, skip in selector

        const block = document.createElement('div')
        block.className = 'cat-block'

        // Group tools by row
        const byRow = {}
        group.tools.forEach(t => {
            const r = t.row ?? 0
            if (!byRow[r]) byRow[r] = []
            byRow[r].push(t)
        })

        const selectedCount = group.tools.filter(t => isSelected(t.id, group.name)).length

        block.innerHTML = `
            <div class="cat-block-header">
                <div class="cat-dot" style="background:${group.color}"></div>
                <div class="cat-block-name">${group.name} <span style="color:var(--text-muted);font-weight:400;font-size:10px">${selectedCount}/${group.tools.length}</span></div>
                <button class="select-all-btn" data-cat="${group.name}">全選</button>
            </div>
            <div class="tool-rows" id="rows-${group.name.replace(/\./g,'')}"></div>
        `
        grid.appendChild(block)

        const rowsEl = block.querySelector(`#rows-${group.name.replace(/\./g,'')}`)

        Object.keys(byRow).sort().forEach(r => {
            if (Object.keys(byRow).length > 1) {
                const lbl = document.createElement('div')
                lbl.className = 'tool-row-label'
                lbl.textContent = r == 0 ? 'General' : `Row ${r}`
                rowsEl.appendChild(lbl)
            }
            const rowDiv = document.createElement('div')
            rowDiv.className = 'tool-row-items'
            byRow[r].forEach(t => {
                const sel = isSelected(t.id, group.name)
                const item = document.createElement('div')
                item.className = 'tool-item' + (sel ? ' selected' : '')
                item.innerHTML = `
                    <div class="ti-icon">${t.icon
                        ? `<svg viewBox="0 0 24 24" fill="none" stroke="${sel ? '#fff' : 'currentColor'}" stroke-width="1.5" width="16" height="16">${t.icon}</svg>`
                        : `<span style="font-size:11px;font-weight:700;color:${sel ? '#fff' : 'var(--text-muted)'}">${t.textIcon || t.label}</span>`
                    }</div>
                    <span class="ti-label">${t.label}</span>
                `
                item.addEventListener('click', () => toggleTool(t.id, group.name))
                rowDiv.appendChild(item)
            })
            rowsEl.appendChild(rowDiv)
        })

        // Select all button
        block.querySelector('.select-all-btn').addEventListener('click', () => {
            const allSelected = group.tools.every(t => isSelected(t.id, group.name))
            if (allSelected) {
                group.tools.forEach(t => {
                    myPanel = myPanel.filter(s => !(s.id === t.id && s.category === group.name))
                })
            } else {
                group.tools.forEach(t => {
                    if (!isSelected(t.id, group.name)) myPanel.push({ id: t.id, category: group.name })
                })
            }
            saveMyPanel()
            renderMyPanel()
            renderSelector()
        })
    })
}

// ── State tab ─────────────────────────────────────────────────────────────────
function renderState() {
    const state = (() => {
        try {
            return {
                layers: JSON.parse(localStorage.getItem('scoreflow_layers') || 'null'),
                activeCategories: JSON.parse(localStorage.getItem('scoreflow_active_categories') || 'null'),
                activeSource: localStorage.getItem('scoreflow_active_source'),
                ok: true
            }
        } catch(e) { return { ok: false } }
    })()

    const liveLayerMap = {}
    if (state.layers) state.layers.forEach(l => { liveLayerMap[l.id] = l })

    const lsDot = document.getElementById('ls-dot')
    const lsStatus = document.getElementById('ls-status')
    if (state.layers) {
        lsDot.className = 'dot green'
        lsStatus.textContent = `localStorage — ${state.layers.length} layers loaded`
    } else {
        lsDot.className = 'dot yellow'
        lsStatus.textContent = 'localStorage — 無資料'
    }

    const activeCategories = state.activeCategories || []
    const activeDot = document.getElementById('active-dot')
    const activeStatus = document.getElementById('active-status')
    if (activeCategories.length) {
        activeDot.className = 'dot green'
        activeStatus.textContent = `Active: ${activeCategories.join(', ')}${state.activeSource ? ' · ' + state.activeSource : ''}`
    } else {
        activeDot.className = 'dot gray'
        activeStatus.textContent = 'Active category: 未知'
    }

    const totalTools = TOOLSETS.reduce((s, g) => s + g.tools.length, 0)
    const visibleLayers = state.layers ? state.layers.filter(l => l.visible !== false).length : '?'
    const hiddenLayers  = state.layers ? state.layers.filter(l => l.visible === false).length : '?'
    document.getElementById('summary-row').innerHTML = `
        <div class="summary-card"><div class="num">${TOOLSETS.length}</div><div class="lbl">Total Groups</div></div>
        <div class="summary-card"><div class="num">${totalTools}</div><div class="lbl">Total Tools</div></div>
        <div class="summary-card"><div class="num" style="color:var(--success)">${visibleLayers}</div><div class="lbl">Visible Layers</div></div>
        <div class="summary-card"><div class="num" style="color:var(--text-muted)">${hiddenLayers}</div><div class="lbl">Hidden Layers</div></div>
    `

    const catGrid = document.getElementById('categories-grid')
    catGrid.innerHTML = ''
    TOOLSETS.forEach(group => {
        const isEdit = group.type === 'edit'
        const layer = INITIAL_LAYERS.find(l => l.type === group.type)
        const liveLayer = layer ? liveLayerMap[layer.id] : null
        const layerVisible = liveLayer ? liveLayer.visible !== false : true
        const isActive = activeCategories.includes(group.name)

        let classes = 'cat-card'
        if (isActive) classes += ' active'
        if (!layerVisible && !isEdit) classes += ' hidden-layer'

        const byRow = {}
        group.tools.forEach(t => { const r = t.row||0; if(!byRow[r])byRow[r]=[]; byRow[r].push(t) })
        const toolsHtml = Object.keys(byRow).sort().flatMap(r =>
            byRow[r].map(t => `<span class="tool-chip"><span class="tool-chip-row">${r>0?'R'+r:''}</span><code>${t.id}</code></span>`)
        ).join('')

        const visLabel = isEdit ? 'System' : (layerVisible ? 'VISIBLE' : 'HIDDEN')
        const visCls = isEdit ? 'badge-edit' : (layerVisible ? 'badge-visible' : 'badge-hidden')
        const layerInfoHtml = layer
            ? `<div class="layer-info"><div class="dot" style="background:${layer.color};flex-shrink:0"></div><span>Layer: <code>${layer.id}</code></span><span>·</span><span>Type: <code>${layer.type}</code></span>${liveLayer ? `<span>·</span><span style="color:${liveLayer.visible!==false?'var(--success)':'var(--text-muted)'}">${liveLayer.visible!==false?'👁 visible':'🚫 hidden'}</span>` : ''}</div>`
            : `<div class="layer-info" style="color:var(--warn)">⚠ No layer binding</div>`

        catGrid.insertAdjacentHTML('beforeend', `
            <div class="${classes}">
                <div class="cat-header">
                    <div class="cat-color-dot" style="background:${layer?.color||'#6366f1'}"></div>
                    <div class="cat-name">${group.name}</div>
                    <span class="cat-badge ${visCls}">${visLabel}</span>
                    ${isActive ? '<span class="cat-badge badge-active">ACTIVE</span>' : ''}
                </div>
                ${layerInfoHtml}
                <div style="font-size:10px;color:var(--text-muted);margin-bottom:8px;font-weight:600">${group.tools.length} tools</div>
                <div class="tools-list">${toolsHtml}</div>
            </div>
        `)
    })
}

// ── Tab switching ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'))
        btn.classList.add('active')
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active')
        if (btn.dataset.tab === 'state') renderState()
    })
})

// ── Init ──────────────────────────────────────────────────────────────────────
loadMyPanel()
renderMyPanel()
renderSelector()
</script>
