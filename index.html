<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScoreFlow | Elite SheetMusic Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app">
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🎵</span>
        <h1>ScoreFlow</h1>
      </div>
      <div class="actions">
        <div class="navigation-controls">
          <button id="header-prev-jump" class="btn btn-icon" title="Jump to Previous Anchor (↑)">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <path d="m18 15-6-6-6 6" />
            </svg>
          </button>
          <button id="header-next-jump" class="btn btn-icon" title="Jump to Next Anchor (↓ / Space)">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>
        </div>
        <div class="zoom-controls">
          <button id="zoom-out" class="btn btn-icon" title="Zoom Out">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M5 12h14" />
            </svg>
          </button>
          <span id="zoom-level">150%</span>
          <button id="zoom-in" class="btn btn-icon" title="Zoom In">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </div>
        <button id="upload-btn" class="btn btn-primary" title="Upload PDF">
          Upload PDF
          <input type="file" id="pdf-upload" accept="application/pdf" hidden />
        </button>
        <button id="toggle-sidebar" class="btn btn-icon" title="Toggle Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-settings-2">
            <path d="M20 7h-9" />
            <path d="M14 17H5" />
            <circle cx="17" cy="17" r="3" />
            <circle cx="7" cy="7" r="3" />
          </svg>
        </button>
      </div>
    </header>

    <main class="viewer-container" id="viewer-container">
      <!-- Visual Jump Line Indicator -->
      <div id="jump-line" class="jump-line">
        <span class="jump-line-label">Jump Target</span>
      </div>
      <!-- PDF Pages will be rendered here -->
      <div id="pdf-viewer" class="pdf-viewer"></div>
    </main>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-content">
        <section>
          <h3>Layers</h3>
          <div class="layer-list" id="layer-list">
            <!-- Layers will be added here -->
          </div>
          <button id="add-layer-btn" class="btn btn-outline btn-full">Add Layer</button>
        </section>

        <section>
          <h3>Stamp Tools</h3>
          <div class="stamp-tools">
            <div class="stamp-tool-wrapper">
              <button class="stamp-tool active" data-stamp="circle" title="Circle Stamp">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <circle cx="12" cy="12" r="10" />
                </svg>
              </button>
              <span class="stamp-label">Circle</span>
            </div>
            <div class="stamp-tool-wrapper">
              <button class="stamp-tool" data-stamp="square" title="Square Stamp">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                </svg>
              </button>
              <span class="stamp-label">Square</span>
            </div>
            <div class="stamp-tool-wrapper">
              <button class="stamp-tool" data-stamp="check" title="Check Stamp">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <path d="M20 6 9 17l-5-5" />
                </svg>
              </button>
              <span class="stamp-label">Check</span>
            </div>
            <div class="stamp-tool-wrapper">
              <button class="stamp-tool" data-stamp="text" title="Text Stamp">
                <span class="text-tool">T</span>
              </button>
              <span class="stamp-label">Text</span>
            </div>
            <div class="stamp-tool-wrapper">
              <button class="stamp-tool" data-stamp="anchor" title="Anchor Point">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
                  <line x1="4" y1="22" x2="4" y2="15" />
                </svg>
              </button>
              <span class="stamp-label">Anchor</span>
            </div>
          </div>
          <button id="clear-stamps-btn" class="btn btn-danger-outline btn-full">Clear All Stamps</button>
        </section>

        <section>
          <h3>Settings</h3>
          <div class="settings-group">
            <label for="scroll-mode">Scroll Mode</label>
            <select id="scroll-mode" title="Select scrolling behavior">
              <option value="continuous">Continuous</option>
              <option value="paged">Paged (Disabled)</option>
            </select>
          </div>
          <div class="settings-group jump-settings">
            <label for="jump-offset">Jump Target Offset (cm)</label>
            <div class="settings-group-row">
              <input type="range" id="jump-offset" min="0" max="10" step="0.5" value="1" class="flex-input">
              <span id="jump-offset-value">1.0cm</span>
            </div>
            <p class="sub-text">調整跳轉後水平基準線的位置</p>
          </div>
        </section>
      </div>
    </aside>

    <!-- Mobile Toolbar (Only on iOS/Mobile) -->
    <nav class="mobile-toolbar">
      <button class="tool-btn" id="prev-jump" title="Previous Anchor">↑ Jump</button>
      <button class="tool-btn" id="next-jump" title="Next Anchor">↓ Jump</button>
      <button class="tool-btn" id="mobile-stamp-toggle">Tools</button>
    </nav>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
